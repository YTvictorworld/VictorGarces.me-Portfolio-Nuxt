about:
  title: "Sobre mí"
  description: ¡Hola! Soy Víctor Garcés, desarrollador full-stack de Santo Domingo, República Dominicana, actualmente estudiando Ciencias de la Computación. Con un grado técnico y más de tres años de experiencia front-end creando experiencias web modernas y responsivas, más casi un año construyendo back-ends con C#, bases de datos, AWS, Docker y microservicios, cubro todo el stack, desde la interfaz hasta la infraestructura. Más allá del código, soy un apasionado del cine, la fotografía y la edición de video, con dominio de cinematografía, narrativa, composición, iluminación y postproducción con herramientas como Adobe Premiere Pro. Combino mi experiencia técnica con mi visión creativa para entregar experiencias digitales funcionales y visualmente cautivadoras.
