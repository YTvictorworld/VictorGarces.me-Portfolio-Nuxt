about:
  title: "About Me"
  description: Hi! I'm Víctor Garcés, a full-stack developer from Santo Domingo, Dominican Republic, currently studying Computer Science. With a Technical Degree and over three years of front-end experience creating modern, responsive web experiences, plus nearly a year building back-ends with C#, databases, AWS, Docker and microservices, I cover the whole stack from interface to infrastructure. Beyond coding, I am a passionate filmmaker, photographer, and video editor, skilled in cinematography, storytelling, composition, lighting, and post-production using tools like Adobe Premiere Pro. I merge my technical expertise with my creative vision to deliver visually captivating and functional digital experiences.
